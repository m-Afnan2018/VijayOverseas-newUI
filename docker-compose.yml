services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: vo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: vijay-overseas
    volumes:
      - mongo_data:/data/db
    networks:
      - vo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend API ────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vo_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/vijay-overseas
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - vo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (static export via nginx) ────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    container_name: vo_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - vo_net

  # ── Admin Panel ────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    container_name: vo_admin
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    networks:
      - vo_net

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

networks:
  vo_net:
    driver: bridge
