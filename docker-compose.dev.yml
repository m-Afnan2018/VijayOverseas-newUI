services:

  # ── MongoDB — expose port for local GUI tools ──────────────────────────────
  mongo:
    ports:
      - "27017:27017"

  # ── Backend — nodemon hot-reload with bind-mounted source ─────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    command: ["npx", "nodemon", "server.js"]

  # ── Frontend — Next.js dev server ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

  # ── Admin — Next.js dev server ─────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      PORT: 3001
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev", "--", "-p", "3001"]
